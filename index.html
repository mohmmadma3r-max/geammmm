<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة خاصة 💕</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            transition: all 0.5s ease;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        h2 {
            color: #ff4d6d;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* ستيل الأسئلة */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #ffb3c1;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            text-align: right;
        }

        .option-btn:hover {
            background: #ffe5ec;
            border-color: #ff4d6d;
        }

        .option-btn.selected {
            background: #ff4d6d;
            color: white;
            border-color: #ff4d6d;
        }

        .next-btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
            width: 100%;
        }

        .next-btn:hover {
            background: #ff758f;
        }

        /* اللعبة الأولى: أكل القلب */
        #game1-canvas-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #fff0f3;
            border-radius: 15px;
            border: 2px dashed #ffb3c1;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .game-char {
            position: absolute;
            font-size: 35px;
            line-height: 1;
            transition: top 0.1s linear, left 0.1s linear;
        }

        .game-target {
            position: absolute;
            font-size: 25px;
            line-height: 1;
        }

        .score-board {
            font-size: 18px;
            font-weight: bold;
            color: #ff4d6d;
            margin-bottom: 10px;
        }

        /* اللعبة الثانية: حماية القلب */
        #game2-canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: linear-gradient(to top, #ffe5ec, #8ecae6);
            border-radius: 15px;
            border: 2px solid #ffb3c1;
            margin-bottom: 15px;
            overflow: hidden;
            cursor: none; /* إخفاء الماوس لتسهيل التحكم بالحامي */
        }

        .balloon-heart {
            position: absolute;
            font-size: 30px;
            bottom: 20px;
            left: 50px;
        }

        .shield {
            position: absolute;
            width: 50px;
            height: 10px;
            background: #ff4d6d;
            border-radius: 50px;
        }

        .obstacle {
            position: absolute;
            font-size: 20px;
        }

        /* شاشة الرسالة النهائية */
        .final-message {
            font-size: 18px;
            line-height: 1.8;
            color: #4a4a4a;
            white-space: pre-wrap;
            text-align: right;
            max-height: 400px;
            overflow-y: auto;
            padding-left: 10px;
        }

        /* أزرار التحكم الافتراضية للهواتف في اللعبة الأولى */
        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            width: 150px;
            margin: 10px auto 0;
        }
        .mobile-controls button {
            background: #ffb3c1;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        .mobile-controls button:active {
            background: #ff4d6d;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">

    <div id="quiz-screen" class="screen active">
        <h2 id="question-title">السؤال الأول</h2>
        <div class="options-container" id="options-box">
            </div>
        <button class="next-btn" onclick="handleNextQuestion()">التالي ✨</button>
    </div>

    <div id="game1-screen" class="screen">
        <h2>ساعد 🌝 يأكل القلوب 💕</h2>
        <div class="score-board">النقاط: <span id="game1-score">0</span> / 5</div>
        <div id="game1-canvas-container">
            <div id="player1" class="game-char">🌝</div>
            <div id="target1" class="game-target">💕</div>
        </div>
        <p style="font-size: 12px; color: #666;">تحكم بالأسهم ⬆️⬇️⬅️➡️ أو الأزرار بالأسفل:</p>
        <div class="mobile-controls">
            <td></td><button onclick="movePlayer('up')">⬆️</button><td></td>
            <button onclick="movePlayer('left')">⬅️</button><button onclick="movePlayer('down')">⬇️</button><button onclick="movePlayer('right')">➡️</button>
        </div>
    </div>

    <div id="game2-screen" class="screen">
        <h2>احمِ القلب 💘 من العقبات!</h2>
        <div class="score-board">الارتفاع: <span id="game2-height">0</span> متر / 50</div>
        <div id="game2-canvas-container">
            <div id="shield" class="shield"></div>
            <div id="balloon" class="balloon-heart">💘</div>
            </div>
        <p style="font-size: 12px; color: #666;">حرك الماوس أو إصبعك داخل المربع لحماية القلب</p>
    </div>

    <div id="final-screen" class="screen">
        <h2>فُزتي باللعبة! 🎉🥳</h2>
        <div class="final-message" id="final-text"></div>
    </div>

</div>

<script>
    // --- بيانات الأسئلة والإجابات الصحيحة ---
    const quizData = [
        {
            q: "السؤال الاول : كم بحبك ؟",
            options: ["أ- كثير", "ب- كثير كثير كثير كثير", "ج- انا ما بحبك 🙂 بس بموت فيكي 😂💕💕"],
            correct: [2] // ج
        },
        {
            q: "السؤال الثاني : بحسب وصف الطبيب لي مواعيد اخذ فيتامين H هي",
            options: ["أ- مره الصبح", "ب- مرة العصر", "ج- يا روحي انت تعالي دايما وبنحكي بس اهم اشي اكون فاضية 💕💕"],
            correct: [2] // ج
        },
        {
            q: "السؤال الثالث : تاريخ ميلادي وميلادك",
            options: ["أ- 16/12  29/5", "ب- 16/11 29/5"],
            correct: [0] // أ
        },
        {
            q: "السؤال الرابع رمز تلفوني المعتمد "اختاري جوابين":",
            options: ["a- mohmed16", "b- hala529", "c-mmhh529"],
            correct: [1, 2], // b + c (متعدد الاختيارات)
            isMultiple: true
        }
    ];

    let currentQuestionIndex = 0;
    let selectedOptions = [];

    function loadQuestion() {
        const currentQ = quizData[currentQuestionIndex];
        document.getElementById('question-title').innerText = currentQ.q;
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = '';
        selectedOptions = [];

        currentQ.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(index, btn, currentQ.isMultiple);
            optionsBox.appendChild(btn);
        });
    }

    function selectOption(index, btn, isMultiple) {
        if (!isMultiple) {
            // اختيار مفرد
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedOptions = [index];
        } else {
            // اختيار متعدد (للسؤال الرابع b و c)
            if (selectedOptions.includes(index)) {
                selectedOptions = selectedOptions.filter(i => i !== index);
                btn.classList.remove('selected');
            } else {
                selectedOptions.push(index);
                btn.classList.add('selected');
            }
        }
    }

    function handleNextQuestion() {
        const currentQ = quizData[currentQuestionIndex];
        
        // التحقق من صحة الإجابة
        let isCorrect = false;
        if (currentQ.isMultiple) {
            isCorrect = currentQ.correct.length === selectedOptions.length && 
                        currentQ.correct.every(val => selectedOptions.includes(val));
        } else {
            isCorrect = selectedOptions.length === 1 && selectedOptions[0] === currentQ.correct[0];
        }

        if (!isCorrect) {
            alert("الإجابة مش صحيحة 🧐 ركزي وحاولي مرة ثانية وثالثة عادي 💕");
            return;
        }

        // الانتقال للسؤال التالي أو اللعبة الأولى
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            switchScreen('quiz-screen', 'game1-screen');
            initGame1();
        }
    }

    function switchScreen(from, to) {
        document.getElementById(from).classList.remove('active');
        document.getElementById(to).classList.add('active');
    }

    // --- اللعبة الأولى: أكل القلب 🌝 + 💕 ---
    let game1Score = 0;
    let p1X = 20, p1Y = 20;
    let t1X = 200, t1Y = 150;
    const container1 = document.getElementById('game1-canvas-container');
    const player1 = document.getElementById('player1');
    const target1 = document.getElementById('target1');

    function initGame1() {
        updatePositions();
        window.addEventListener('keydown', handleGame1Keys);
    }

    function updatePositions() {
        player1.style.left = p1X + 'px';
        player1.style.top = p1Y + 'px';
        target1.style.left = t1X + 'px';
        target1.style.top = t1Y + 'px';
    }

    function movePlayer(dir) {
        const step = 20;
        if (dir === 'up' && p1Y > 0) p1Y -= step;
        if (dir === 'down' && p1Y < 265) p1Y += step;
        if (dir === 'left' && p1X > 0) p1X -= step;
        if (dir === 'right' && p1X < 465) p1X += step;
        
        updatePositions();
        checkCollision1();
    }

    function handleGame1Keys(e) {
        if (document.getElementById('game1-screen').classList.contains('active')) {
            if (e.key === 'ArrowUp') movePlayer('up');
            if (e.key === 'ArrowDown') movePlayer('down');
            if (e.key === 'ArrowLeft') movePlayer('left');
            if (e.key === 'ArrowRight') movePlayer('right');
        }
    }

    function checkCollision1() {
        let dist = Math.sqrt(Math.pow(p1X - t1X, 2) + Math.pow(p1Y - t1Y, 2));
        if (dist < 30) {
            game1Score++;
            document.getElementById('game1-score').innerText = game1Score;
            if (game1Score >= 5) {
                window.removeEventListener('keydown', handleGame1Keys);
                switchScreen('game1-screen', 'game2-screen');
                initGame2();
            } else {
                // نقل القلب لمكان عشوائي
                t1X = Math.floor(Math.random() * (container1.clientWidth - 30));
                t1Y = Math.floor(Math.random() * (container1.clientHeight - 30));
                updatePositions();
            }
        }
    }


    // --- اللعبة الثانية: حماية البالون/القلب 💘 (مستوى: متوسط إلى صعب) ---
    let game2Height = 0;
    let game2Interval;
    let obstacleInterval;
    const container2 = document.getElementById('game2-canvas-container');
    const shield = document.getElementById('shield');
    const balloon = document.getElementById('balloon');
    let bX = 220, bY = 320; 
    let sX = 210, sY = 250; 

    function initGame2() {
        balloon.style.left = bX + 'px';
        balloon.style.top = bY + 'px';
        
        container2.addEventListener('mousemove', (e) => {
            const rect = container2.getBoundingClientRect();
            sX = e.clientX - rect.left - 25;
            sY = e.clientY - rect.top - 5;
            if(sY > 370) sY = 370;
            shield.style.left = sX + 'px';
            shield.style.top = sY + 'px';
        });

        container2.addEventListener('touchmove', (e) => {
            const rect = container2.getBoundingClientRect();
            const touch = e.touches[0];
            sX = touch.clientX - rect.left - 25;
            sY = touch.clientY - rect.top - 5;
            shield.style.left = sX + 'px';
            shield.style.top = sY + 'px';
        });

        // عداد الارتفاع
        game2Interval = setInterval(() => {
            game2Height++;
            document.getElementById('game2-height').innerText = game2Height;
            if (game2Height >= 50) {
                endGame2(true);
            }
        }, 300);

        // تم تقليل وقت توليد العقبات من 1000ms إلى 450ms لزيادة الكثافة
        obstacleInterval = setInterval(createObstacle, 450);
    }

    function createObstacle() {
        if (!document.getElementById('game2-screen').classList.contains('active')) return;
        const obs = document.createElement('div');
        obs.className = 'obstacle';
        obs.innerText = ['🧱', '📦', '💥', '⚡', '💣', '☄️'][Math.floor(Math.random() * 6)];
        obs.style.left = Math.floor(Math.random() * (container2.clientWidth - 20)) + 'px';
        obs.style.top = '0px';
        container2.appendChild(obs);

        let obsY = 0;
        // إضافة انحراف جانبي عشوائي لتصعيب اللعبة وتغيير مسار العقبة أثناء السقوط
        let drift = (Math.random() - 0.5) * 2; 

        // تم زيادة سرعة النزول الرأسي من 4 إلى 6
        let obsMove = setInterval(() => {
            obsY += 6; 
            obs.style.top = obsY + 'px';
            
            let currentX = parseInt(obs.style.left) + drift;
            if (currentX > 0 && currentX < container2.clientWidth - 20) {
                obs.style.left = currentX + 'px';
            }

            // تصادم مع الحامي (Shield)
            if (obsY + 20 >= sY && obsY <= sY + 10 && parseInt(obs.style.left) + 20 >= sX && parseInt(obs.style.left) <= sX + 50) {
                clearInterval(obsMove);
                obs.remove();
            }

            // تصادم مع القلب (الخسارة وإعادة اللعبة)
            if (obsY + 20 >= bY && obsY <= bY + 30 && parseInt(obs.style.left) + 20 >= bX && parseInt(obs.style.left) <= bX + 30) {
                clearInterval(obsMove);
                obs.remove();
                alert("أوووبس! العقبة صابت القلب 💘، خلينا نحاول نحميه أحسن هالمرة!");
                resetGame2();
            }

            // خروج العقبة من الشاشة
            if (obsY > 400) {
                clearInterval(obsMove);
                obs.remove();
            }
        }, 20);
    }

    function resetGame2() {
        game2Height = 0;
        document.getElementById('game2-height').innerText = game2Height;
        const obstacles = document.querySelectorAll('.obstacle');
        obstacles.forEach(o => o.remove());
    }

    function endGame2(isWin) {
        clearInterval(game2Interval);
        clearInterval(obstacleInterval);
        if (isWin) {
            switchScreen('game2-screen', 'final-screen');
            showFinalMessage();
        }
    }

    // --- عرض الرسالة النهائية ---
    function showFinalMessage() {
        const msg = `يعطيكي الف الف الف الف الف عافية يارب 🥺🥺💘💘 وهاي هيك فزتي باللعبة بس بالله عليكي اضحكيلي شوي يلا 🧐🧐🧐 يختشششششي 😂😂😂 ولك هاي الضحكه مش بس بحبها وبموت فيها 💕😂 يلا كتكوته خليكي هيك مبسوطه ولا بدك ازعل منك يعني 🙂 واه ترا بزعل لو تضلي هيك عادي اضحكي ما انتي ضاحكه الي مش لحدا غريب 🌚🌚 وكمان just Ilove you ومش بكيفك 😒 ولك دخخيييييللللللل الي بضحك 😂😂 يختششششييييي 😂😂😂 ايوه هيك بحب اشوف هالغمازات انا 😂💕 واهم اشي تعالي على السناب واحكيلي رأيك بكل صراحه عجبتك ولا لا 🙂 وكمان عندي سؤال زنوخ شوي 🙂 كم بتحبي تحكي معي 🌚🌚🌚 انا اقسم بالله عارف الاجابة 😂😂😂`;
        
        document.getElementById('final-text').innerText = msg;
    }

    // بدء السؤال الأول عند تشغيل الصفحة
    loadQuestion();
</script>

</body>
</html>
